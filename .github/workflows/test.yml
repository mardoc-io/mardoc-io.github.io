name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit + component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run vitest (unit + component tests)
        run: npm test

      - name: Verify static export builds
        run: npx next build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        # Install both chromium AND webkit — the mobile test project
        # uses the iPhone 14 device profile which launches webkit.
        # Without webkit, mobile tests fail with "Executable doesn't
        # exist at .../webkit-xxxx/pw_run.sh".
        run: npx playwright install --with-deps chromium webkit

      - name: Build the app
        run: npx next build

      - name: Run Playwright e2e tests
        run: npm run e2e
