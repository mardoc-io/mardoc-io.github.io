name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm audit --prod || true

  unit:
    name: Unit + component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run vitest (unit + component tests)
        run: pnpm test

      - name: Verify static export builds
        run: pnpm exec next build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        # Install both chromium AND webkit — the mobile test project
        # uses the iPhone 14 device profile which launches webkit.
        # Without webkit, mobile tests fail with "Executable doesn't
        # exist at .../webkit-xxxx/pw_run.sh".
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Build the app
        run: pnpm exec next build

      - name: Run Playwright e2e tests
        run: pnpm run e2e
